version: '3.8'

services:
  # ============================================
  # API GATEWAY - NGINX
  # ============================================
  api_gateway:
    image: nginx:1.25.5
    container_name: simar_api_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - auth_api
      - usuarios_api
      - vehiculos_api
      - recolecciones_api
      - clientes_api
      - contratos_api
      - manifiestos_api
    networks:
      - simar_network
    restart: unless-stopped

  # ============================================
  # MICROSERVICIO: AUTENTICACIÓN
  # ============================================
  auth_api:
    build:
      context: ./servicios/auth_api
      dockerfile: Dockerfile
    container_name: simar_auth_api
    ports:
      - "8001:8001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8001
      - JWT__Key=${JWT_KEY}
      - JWT__Issuer=${JWT_ISSUER}
      - JWT__Audience=${JWT_AUDIENCE}
      - JWT__ExpiresInMinutes=60
    networks:
      - simar_network
    restart: unless-stopped

  # ============================================
  # MICROSERVICIO: USUARIOS
  # ============================================
  usuarios_api:
    build:
      context: ./servicios/usuarios_api
      dockerfile: Dockerfile
    container_name: simar_usuarios_api
    ports:
      - "8002:8002"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8002
    networks:
      - simar_network
    restart: unless-stopped

  # ============================================
  # MICROSERVICIO: VEHÍCULOS
  # ============================================
  vehiculos_api:
    build:
      context: ./servicios/vehiculos_api
      dockerfile: Dockerfile
    container_name: simar_vehiculos_api
    ports:
      - "8003:8003"
    environment:
      - NODE_ENV=production
      - PORT=8003
      - DB_HOST=mysql_vehiculos
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=Simar123!
      - DB_NAME=simar_vehiculos_db
    depends_on:
      - mysql_vehiculos
    networks:
      - simar_network
    restart: unless-stopped

  # ============================================
  # MICROSERVICIO: RECOLECCIONES
  # ============================================
  recolecciones_api:
    build:
      context: ../servicios/recolecciones_api
      dockerfile: Dockerfile
    container_name: simar_recolecciones_api
    ports:
      - "8004:8004"
    environment:
      - PORT=8004
      - MONGODB_HOST=mongo_recolecciones
      - MONGODB_PORT=27017
      - MONGODB_USER=root
      - MONGODB_PASSWORD=Simar123!
      - MONGODB_DB=simar_recolecciones_db
    depends_on:
      - mongo_recolecciones
    networks:
      - simar_network
    restart: unless-stopped

  # ============================================
  # MICROSERVICIO: CLIENTES
  # ============================================
  clientes_api:
    build:
      context: ./servicios/clientes_api
      dockerfile: Dockerfile
    container_name: simar_clientes_api
    ports:
      - "8005:8005"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8005
    networks:
      - simar_network
    restart: unless-stopped

  # ============================================
  # MICROSERVICIO: CONTRATOS
  # ============================================
  contratos_api:
    build:
      context: ./servicios/contratos_api
      dockerfile: Dockerfile
    container_name: simar_contratos_api
    ports:
      - "8006:8006"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8006
      - ConnectionStrings__DefaultConnection=Server=sqlserver_contratos;Database=ContractsDB;User=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;
    depends_on:
      - sqlserver_contratos
    networks:
      - simar_network
    restart: unless-stopped

  # ============================================
  # MICROSERVICIO: MANIFIESTOS
  # ============================================
  manifiestos_api:
    build:
      context: ./servicios/manifiestos_api
      dockerfile: Dockerfile
    container_name: simar_manifiestos_api
    ports:
      - "8007:8007"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8007
    networks:
      - simar_network
    restart: unless-stopped


# ============================================
  # BASES DE DATOS - MySQL
  # ============================================  

  mysql_vehiculos:
    image: mysql:8.0
    container_name: simar_mysql_vehiculos
    environment:
      - MYSQL_ROOT_PASSWORD=Simar123!
      - MYSQL_DATABASE=simar_vehiculos_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_vehiculos_data:/var/lib/mysql
      - ./servicios/vehiculos_api/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - simar_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

# ============================================
  # MONGODB - RECOLECCIONES
  # ============================================
  mongo_recolecciones:
    image: mongo:7
    container_name: simar_mongo_recolecciones
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=Simar123!
      - MONGO_INITDB_DATABASE=simar_recolecciones_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_recolecciones_data:/data/db
      - ../servicios/recolecciones_api/scripts/init_mongo.js:/docker-entrypoint-initdb.d/init_mongo.js
    networks:
      - simar_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================
  # SQL SERVER - CONTRATOS
  # ============================================
  sqlserver_contratos:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: simar_sqlserver_contratos
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_contratos_data:/var/opt/mssql
    networks:
      - simar_network
    restart: unless-stopped

# ============================================
# VOLÚMENES
# ============================================
volumes:
  mysql_vehiculos_data:
  mongo_recolecciones_data:
  sqlserver_contratos_data:

# ============================================
# REDES
# ============================================
networks:
  simar_network:
    driver: bridge
version: '3.8'

services:
  # ============================================
  # API GATEWAY - NGINX
  # ============================================
  api_gateway:
    image: nginx:1.25.5
    container_name: simar_api_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - auth_api
      - usuarios_api
      - vehiculos_api
      - recolecciones_api
      - clientes_api
      - contratos_api
      - manifiestos_api
      - empleados_api
      - facturacion_api
    networks:
      - simar_network
    restart: unless-stopped

  # ============================================
  # MICROSERVICIO: AUTENTICACIÓN
  # ============================================
  auth_api:
    build:
      context: ./servicios/auth_api
      dockerfile: Dockerfile
    container_name: simar_auth_api
    ports:
      - "8001:8001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8001
      - JWT__Key=${JWT_KEY}
      - JWT__Issuer=${JWT_ISSUER}
      - JWT__Audience=${JWT_AUDIENCE}
      - JWT__ExpiresInMinutes=60
    networks:
      - simar_network
    restart: unless-stopped

  # ============================================
  # MICROSERVICIO: USUARIOS
  # ============================================
  usuarios_api:
    build:
      context: ./servicios/usuarios_api
      dockerfile: Dockerfile
    container_name: simar_usuarios_api
    ports:
      - "8002:8002"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8002
    networks:
      - simar_network
    restart: unless-stopped

  # ============================================
  # MICROSERVICIO: VEHÍCULOS
  # ============================================
  vehiculos_api:
    build:
      context: ./servicios/vehiculos_api
      dockerfile: Dockerfile
    container_name: simar_vehiculos_api
    ports:
      - "8003:8003"
    environment:
      - NODE_ENV=production
      - PORT=8003
      - DB_HOST=mysql_vehiculos
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=Simar123!
      - DB_NAME=simar_vehiculos_db
    depends_on:
      - mysql_vehiculos
    networks:
      - simar_network
    restart: unless-stopped

  # ============================================
  # MICROSERVICIO: RECOLECCIONES
  # ============================================
  recolecciones_api:
    build:
      context: ../servicios/recolecciones_api
      dockerfile: Dockerfile
    container_name: simar_recolecciones_api
    ports:
      - "8004:8004"
    environment:
      - PORT=8004
      - MONGODB_HOST=mongo_recolecciones
      - MONGODB_PORT=27017
      - MONGODB_USER=root
      - MONGODB_PASSWORD=Simar123!
      - MONGODB_DB=simar_recolecciones_db
    depends_on:
      - mongo_recolecciones
    networks:
      - simar_network
    restart: unless-stopped

  # ============================================
  # MICROSERVICIO: CLIENTES
  # ============================================
  clientes_api:
    build:
      context: ./servicios/API_Clientes
      dockerfile: Dockerfile
    container_name: simar_clientes_api
    ports:
      - "8005:8005"
    env_file:
      - .env
    environment:
      - DATABASE_CLIENT_URL=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_client_db:5432/${POSTGRES_CLIENT_DB}
    command: >
      sh -c "
        echo 'Esperando a PostgreSQL...';
        until pg_isready -h postgres_client_db -U ${POSTGRES_USER}; do
          sleep 2;
        done;
        echo 'Ejecutando migraciones...';
        alembic upgrade head;
        echo 'Iniciando servidor...';
        uvicorn app.main:app --host 0.0.0.0 --port 8005"
    depends_on:
      - postgres_client_db
    networks:
      - simar_network
    restart: unless-stopped

  # ============================================
  # MICROSERVICIO: CONTRATOS
  # ============================================
  contratos_api:
    build:
      context: ./servicios/API_Contracts
      dockerfile: Dockerfile
    container_name: simar_contratos_api
    ports:
      - "8006:8006"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8006
      - ConnectionStrings__DefaultConnection=Server=sqlserver_contratos;Database=ContractsDB;User=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;
    depends_on:
      - sqlserver_contratos
    networks:
      - simar_network
    restart: unless-stopped

  # ============================================
  # MICROSERVICIO: MANIFIESTOS
  # ============================================
  manifiestos_api:
    build:
      context: ./servicios/API_MANIFEST
      dockerfile: Dockerfile
    container_name: simar_manifiestos_api
    ports:
      - "8007:8007"
    environment:
      - NODE_ENV=production
      - PORT=8007
      - DB_HOST=mysql_manifiestos
      - DB_PORT=3306
      - DB_USER=${MANIFEST_DB_USER}
      - DB_PASSWORD=${MANIFEST_DB_PASSWORD}
      - DB_NAME=${MANIFEST_DB_NAME}
    depends_on:
      mysql_manifiestos:
        condition: service_healthy
    volumes:
      - manifiestos_uploads:/app/uploads/manifiestos
    networks:
      - simar_network
    restart: unless-stopped

  # ============================================
  # MICROSERVICIO: EMPLEADOS
  # ============================================
  empleados_api:
    build:
      context: ./servicios/API_Empleados
      dockerfile: Dockerfile
    container_name: simar_empleados_api
    ports:
      - "8008:8008"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8008
      - ConnectionStrings__DefaultConnection=Host=db_empleados;Database=${DB_POSTGRES_NAME};Username=${DB_POSTGRES_USER};Password=${DB_POSTGRES_PASSWORD}
    depends_on:
      - db_empleados
    networks:
      - simar_network
    restart: unless-stopped

  # ============================================
  # MICROSERVICIO: FACTURACIÓN
  # ============================================
  facturacion_api:
    build:
      context: ./servicios/API_Billing
      dockerfile: Dockerfile
    container_name: simar_facturacion_api
    ports:
      - "8009:8009"
    #env_file:
    #  - ./servicios/API_Billing/.env
    environment:
      - PORT=8009
      - MONGODB_HOST=mongo_facturacion
      - MONGODB_PORT=27017
      - MONGODB_USER=${MONGODB_USER}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - MONGODB_DB=${MONGODB_DB}
    depends_on:
      - mongo_facturacion
    networks:
      - simar_network
    restart: unless-stopped

  # ============================================
  # BASES DE DATOS - MySQL
  # ============================================  

  mysql_vehiculos:
    image: mysql:8.0
    container_name: simar_mysql_vehiculos
    environment:
      - MYSQL_ROOT_PASSWORD=Simar123!
      - MYSQL_DATABASE=simar_vehiculos_db
    ports:
      - "8010:3306"
    volumes:
      - mysql_vehiculos_data:/var/lib/mysql
      - ./servicios/vehiculos_api/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - simar_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  # ============================================
  # BASE DE DATOS: MANIFIESTOS - MySQL
  # ============================================
  mysql_manifiestos:
    image: mysql:8.0
    container_name: simar_mysql_manifiestos
    environment:
      - MYSQL_ROOT_PASSWORD=${MANIFEST_DB_PASSWORD}
      - MYSQL_DATABASE=${MANIFEST_DB_NAME}
      - MYSQL_USER=${MANIFEST_DB_USER}
      - MYSQL_PASSWORD=${MANIFEST_DB_PASSWORD}
    ports:
      - "8011:3306"
    volumes:
      - mysql_manifiestos_data:/var/lib/mysql
      - ./servicios/API_MANIFEST/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - simar_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  # ============================================
  # MONGODB - RECOLECCIONES
  # ============================================
  mongo_recolecciones:
    image: mongo:7
    container_name: simar_mongo_recolecciones
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=Simar123!
      - MONGO_INITDB_DATABASE=simar_recolecciones_db
    ports:
      - "8012:27017"
    volumes:
      - mongo_recolecciones_data:/data/db
      - ../servicios/recolecciones_api/scripts/init_mongo.js:/docker-entrypoint-initdb.d/init_mongo.js
    networks:
      - simar_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================
  # MONGODB - FACTURACIÓN
  # ============================================
  mongo_facturacion:
    image: mongo:7
    container_name: simar_mongo_facturacion
    environment:
      - MONGO_INITDB_ROOT_USERNAME=facturacion_admin
      - MONGO_INITDB_ROOT_PASSWORD=Simar123!
      - MONGO_INITDB_DATABASE=simar_facturacion_db
    ports:
      - "8013:27017"
    volumes:
      - mongo_facturacion_data:/data/db
    networks:
      - simar_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================
  # SQL SERVER - CONTRATOS
  # ============================================
  sqlserver_contratos:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: simar_sqlserver_contratos
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_contratos_data:/var/opt/mssql
    networks:
      - simar_network
    restart: unless-stopped

  # ============================================
  # POSTGRESQL - CLIENTES
  # ============================================
  postgres_client_db:
    image: postgres:15-alpine
    container_name: simar_postgres_clientes
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_CLIENT_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_clientes_data:/var/lib/postgresql/data
    networks:
      - simar_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # POSTGRES - EMPLEADOS
  # ============================================
  db_empleados:
    image: postgres:15-alpine
    container_name: simar_db_empleados
    environment:
      - POSTGRES_USER=${DB_POSTGRES_USER}
      - POSTGRES_PASSWORD=${DB_POSTGRES_PASSWORD}
      - POSTGRES_DB=${DB_POSTGRES_NAME}
    ports:
      - "${DB_POSTGRES_PORT}:5432"
    volumes:
      - db_empleados_data:/var/lib/postgresql/data
      - ./servicios/API_Empleados/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - simar_network
    restart: unless-stopped

# ============================================
# VOLÚMENES
# ============================================
volumes:
  mysql_vehiculos_data:
  mysql_manifiestos_data:
  manifiestos_uploads:
  mongo_recolecciones_data:
  mongo_facturacion_data:
  sqlserver_contratos_data:
  postgres_clientes_data:
  db_empleados_data:

    # ============================================
    # REDES
    # ============================================
networks:
  simar_network:
    driver: bridge

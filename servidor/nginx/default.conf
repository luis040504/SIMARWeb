map $http_origin $cors_origin {
    default "*";
    "~.*" $http_origin;
}

map $http_origin $cors_header {
    default "*";
    "~.*" "$http_origin";
}

server {
    listen 80;
    client_max_body_size 50M;

    add_header Access-Control-Allow-Origin '*' always;
    add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
    add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-CSRF-TOKEN' always;
    add_header Access-Control-Allow-Credentials 'true' always;
    add_header Access-Control-Max-Age 86400 always;

    
    location / {
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ============================================
    # MICROSERVICIO: AUTENTICACIÓN
    # ============================================
    location /api/auth/ {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin '*';
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
            add_header Access-Control-Allow-Headers '*';
            add_header Access-Control-Allow-Credentials 'true';
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type 'text/plain; charset=utf-8';
            return 204;
        }

        proxy_pass http://auth_api:8001/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth {
